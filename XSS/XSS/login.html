<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XSS Toolkit — Login</title>
    <meta name="description" content="Secure login portal for the XSS Browser Automation Toolkit." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="login.css" />
</head>

<body>

    <!-- Animated background -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <!-- Main auth card -->
    <div class="auth-container">
        <div class="auth-card" id="auth-card">

            <!-- Logo -->
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="24" cy="24" r="24" fill="url(#lgr)" />
                        <text x="7" y="34" font-size="26" font-family="Arial" fill="white">&#x2622;</text>
                        <defs>
                            <linearGradient id="lgr" x1="0" y1="0" x2="48" y2="48">
                                <stop offset="0%" stop-color="#ff4444" />
                                <stop offset="100%" stop-color="#cc0000" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="auth-logo-text">
                    <span class="auth-logo-main">XSS</span>
                    <span class="auth-logo-sub">Automation Toolkit</span>
                </div>
            </div>

            <!-- Tab switcher -->
            <div class="auth-tabs-wrap">
                <div class="auth-tabs">
                    <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
                    <div class="tab-indicator" id="tab-indicator"></div>
                </div>
                <button type="button" class="theme-switch-btn" id="theme-toggle-login" onclick="toggleTheme()" title="Switch to light mode">🌙</button>
            </div>

            <!-- LOGIN FORM -->
            <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
                <div class="field-group">
                    <label for="login-username">Username</label>
                    <div class="input-wrap">
                        <span class="input-icon">👤</span>
                        <input type="text" id="login-username" placeholder="Enter username" autocomplete="username"
                            required />
                    </div>
                </div>

                <div class="field-group">
                    <label for="login-password">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="login-password" placeholder="Enter password"
                            autocomplete="current-password" required />
                        <button type="button" class="toggle-pass" onclick="togglePassword('login-password', this)"
                            title="Show password">👁</button>
                    </div>
                </div>

                <div class="field-row">
                    <label class="remember-label">
                        <input type="checkbox" id="remember-me" />
                        <span class="custom-check"></span>
                        Remember me
                    </label>
                </div>

                <div class="auth-error" id="login-error"></div>

                <button type="submit" class="auth-submit" id="login-btn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader" id="login-loader"></span>
                </button>
            </form>

            <!-- REGISTER FORM -->
            <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
                <div class="field-group">
                    <label for="reg-username">Username</label>
                    <div class="input-wrap">
                        <span class="input-icon">👤</span>
                        <input type="text" id="reg-username" placeholder="Choose a username" autocomplete="username"
                            required minlength="3" maxlength="32" />
                    </div>
                </div>

                <div class="field-group">
                    <label for="reg-email">Email</label>
                    <div class="input-wrap">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email"
                            required />
                    </div>
                </div>

                <div class="field-group">
                    <label for="reg-password">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="reg-password" placeholder="Min 6 characters"
                            autocomplete="new-password" required minlength="6" />
                        <button type="button" class="toggle-pass" onclick="togglePassword('reg-password', this)"
                            title="Show password">👁</button>
                    </div>
                </div>

                <div class="field-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="reg-confirm" placeholder="Re-enter password"
                            autocomplete="new-password" required minlength="6" />
                    </div>
                </div>

                <div class="auth-error" id="register-error"></div>

                <button type="submit" class="auth-submit" id="register-btn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader" id="register-loader"></span>
                </button>
            </form>

            <!-- VERIFICATION FORM (shown when SMTP is configured) -->
            <form class="auth-form" id="form-verify" onsubmit="handleVerify(event)">
                <div class="verify-header">
                    <span class="verify-icon">📧</span>
                    <h3>Verify Your Email</h3>
                    <p>We sent a 6-digit code to <strong id="verify-email-display"></strong></p>
                </div>

                <div class="field-group">
                    <label for="verify-code">Verification Code</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔑</span>
                        <input type="text" id="verify-code" placeholder="Enter 6-digit code"
                            maxlength="6" autocomplete="one-time-code" required />
                    </div>
                </div>

                <div class="auth-error" id="verify-error"></div>

                <button type="submit" class="auth-submit" id="verify-btn">
                    <span class="btn-text">Verify Email</span>
                    <span class="btn-loader"></span>
                </button>

                <div class="resend-row">
                    <span>Didn't receive a code?</span>
                    <button type="button" class="resend-link" onclick="handleResend()">Resend Code</button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="auth-footer">
            <span>⚠ Authorized penetration testing only</span>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
